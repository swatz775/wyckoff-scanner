name: Daily Wyckoff Scan

# Runs the scanner once a day and emails setups scoring 80+.
#
# NOTE ON TIMING: GitHub Actions cron is UTC-only and best-effort — runs can be
# delayed (sometimes by an hour or more) and don't fire at an exact minute. We
# target 23:00 UTC = 6 PM US Central during daylight time (CDT). During standard
# time (CST, winter) this lands at 5 PM Central. We deliberately do NOT gate on
# the exact local hour, because GitHub's off-schedule firing would then skip the
# run entirely. Reliability (always sends) is preferred over exact timing.
# For to-the-minute scheduling, use Google Cloud Scheduler (see DEPLOY_GCLOUD.md).
on:
  schedule:
    - cron: "0 23 * * *"   # ~6 PM US Central (CDT); ~5 PM during CST
  workflow_dispatch: {}     # manual "Run workflow" button, any time

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan and email alerts
        env:
          WYCKOFF_SMTP_HOST: ${{ secrets.WYCKOFF_SMTP_HOST }}
          WYCKOFF_SMTP_PORT: ${{ secrets.WYCKOFF_SMTP_PORT }}
          WYCKOFF_SMTP_SENDER: ${{ secrets.WYCKOFF_SMTP_SENDER }}
          WYCKOFF_SMTP_PASSWORD: ${{ secrets.WYCKOFF_SMTP_PASSWORD }}
          WYCKOFF_SMTP_RECIPIENT: ${{ secrets.WYCKOFF_SMTP_RECIPIENT }}
          WYCKOFF_MIN_SCORE: "80"
        run: python scanner.py --email

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wyckoff-report
          path: wyckoff_scanner.html
          if-no-files-found: ignore

      # Publish the dashboard to GitHub Pages as index.html
      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp wyckoff_scanner.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
