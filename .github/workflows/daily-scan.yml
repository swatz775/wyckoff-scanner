name: Daily Wyckoff Scan

# Runs the scanner and emails setups scoring 80+.
#
# TIMING: GitHub Actions' built-in `schedule` cron proved unreliable on the free
# tier — it fired hours off-schedule at random times. So scheduling is handled
# EXTERNALLY by cron-job.org, which calls this workflow's workflow_dispatch API
# at exactly 6 PM America/Chicago. See EXTERNAL_TRIGGER.md for setup. This file
# only exposes workflow_dispatch (manual button + external trigger).
on:
  workflow_dispatch: {}     # manual "Run workflow" button + external cron trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan and email alerts
        env:
          WYCKOFF_SMTP_HOST: ${{ secrets.WYCKOFF_SMTP_HOST }}
          WYCKOFF_SMTP_PORT: ${{ secrets.WYCKOFF_SMTP_PORT }}
          WYCKOFF_SMTP_SENDER: ${{ secrets.WYCKOFF_SMTP_SENDER }}
          WYCKOFF_SMTP_PASSWORD: ${{ secrets.WYCKOFF_SMTP_PASSWORD }}
          WYCKOFF_SMTP_RECIPIENT: ${{ secrets.WYCKOFF_SMTP_RECIPIENT }}
          WYCKOFF_MIN_SCORE: "80"
        run: python scanner.py --email

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wyckoff-report
          path: wyckoff_scanner.html
          if-no-files-found: ignore

      # Publish the dashboard to GitHub Pages as index.html
      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp wyckoff_scanner.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
